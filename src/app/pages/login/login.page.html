<ion-content class="login-shell">
  <div class="login-card">
    <div class="brand-block">
      <ion-icon name="school-outline"></ion-icon>
      <div>
        <h1>SIGENIBA</h1>
        <p>Plataforma escolar</p>
      </div>
    </div>

    <ion-card>
      <ion-card-content>
        <h2>Iniciar sesión</h2>
        <p class="subtitle">Accede a tu cuenta para administrar calificaciones y grupos.</p>

        <ion-list lines="none">
          <ion-item>
            <ion-label position="stacked">Correo institucional</ion-label>
            <ion-input type="email" [(ngModel)]="correo" placeholder="usuario@dominio.com"></ion-input>
          </ion-item>

          <ion-item>
            <ion-label position="stacked">Contraseña</ion-label>
            <ion-input type="password" [(ngModel)]="password" placeholder="••••••••"></ion-input>
          </ion-item>

          <ion-item class="remember-item">
            <ion-checkbox [(ngModel)]="recordar" slot="start"></ion-checkbox>
            <ion-label>Recordar sesión</ion-label>
          </ion-item>
        </ion-list>

        <ion-button expand="block" class="login-button" (click)="iniciarSesion()">
          <ion-icon slot="start" name="lock-closed-outline"></ion-icon>
          Entrar
        </ion-button>

        <ion-text color="danger" *ngIf="mensajeError">
          <p class="footer-text">{{ mensajeError }}</p>
        </ion-text>

        <ion-text color="medium">
          <p class="footer-text">Admin: <strong>admin@sigeniba.com</strong> · <strong>123456</strong></p>
          <p class="footer-text">Alumno: <strong>alumno</strong> · <strong>1234</strong></p>
          <p class="footer-text">¿Olvidaste tu contraseña? Contacta al administrador.</p>
        </ion-text>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
