<ion-content class="login-shell">
  <div class="login-card">
    <ion-card>
      <ion-card-content>
        <h2>Restablecer contraseña</h2>

        <ng-container *ngIf="token; else sinToken">
          <p class="subtitle">Ingresa tu nueva contraseña.</p>

          <ion-list lines="none">
            <div class="field-label">Nueva contraseña</div>
            <ion-item>
              <ion-input [type]="mostrarNuevaPassword ? 'text' : 'password'" autocomplete="new-password" [(ngModel)]="nuevaPassword">
                <ion-icon
                  slot="end"
                  [name]="mostrarNuevaPassword ? 'eye-off-outline' : 'eye-outline'"
                  (click)="mostrarNuevaPassword = !mostrarNuevaPassword"
                ></ion-icon>
              </ion-input>
            </ion-item>

            <div class="field-label">Confirmar nueva contraseña</div>
            <ion-item>
              <ion-input
                [type]="mostrarConfirmarPassword ? 'text' : 'password'"
                autocomplete="new-password"
                [(ngModel)]="confirmarPassword"
              >
                <ion-icon
                  slot="end"
                  [name]="mostrarConfirmarPassword ? 'eye-off-outline' : 'eye-outline'"
                  (click)="mostrarConfirmarPassword = !mostrarConfirmarPassword"
                ></ion-icon>
              </ion-input>
            </ion-item>
          </ion-list>

          <ion-button expand="block" class="login-button" [disabled]="guardando" (click)="guardar()">
            <ion-icon slot="start" name="lock-closed-outline"></ion-icon>
            Guardar nueva contraseña
          </ion-button>
        </ng-container>

        <ng-template #sinToken>
          <ion-text color="danger">
            <p class="footer-text">Enlace inválido. Solicita uno nuevo.</p>
          </ion-text>
        </ng-template>

        <ion-text color="medium">
          <p class="footer-text footer-link" routerLink="/recuperar-password">Solicitar nuevo enlace</p>
        </ion-text>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
