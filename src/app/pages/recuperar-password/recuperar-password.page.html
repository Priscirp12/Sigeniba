<ion-content class="login-shell">
  <div class="login-card">
    <ion-card>
      <ion-card-content>
        <h2>Recuperar contraseña</h2>
        <p class="subtitle">Solo para docentes y administradores.</p>

        <ng-container *ngIf="!enviado">
          <ion-list lines="none">
            <div class="field-label">Usuario o correo</div>
            <ion-item>
              <ion-input [(ngModel)]="identificador" placeholder="usuario o correo@dominio.com"></ion-input>
            </ion-item>
          </ion-list>

          <ion-button expand="block" class="login-button" [disabled]="enviando" (click)="solicitar()">
            <ion-icon slot="start" name="mail-outline"></ion-icon>
            Enviar enlace de recuperación
          </ion-button>
        </ng-container>

        <ion-text color="success" *ngIf="enviado">
          <p class="footer-text">{{ mensaje }}</p>
        </ion-text>

        <ion-text color="medium">
          <p class="footer-text footer-link" routerLink="/login">
            <ion-icon name="arrow-back-outline"></ion-icon>
            Volver a iniciar sesión
          </p>
        </ion-text>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
