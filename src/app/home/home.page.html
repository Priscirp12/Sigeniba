
<ion-header>
  <ion-toolbar>
    <ion-title>SIGENIBA</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Resumen del sistema</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-list>
        <ion-item>
          <ion-label>Total de alumnos</ion-label>
          <ion-label slot="end">{{ summary.totalAlumnos }}</ion-label>
        </ion-item>
        <ion-item>
          <ion-label>Total de docentes</ion-label>
          <ion-label slot="end">{{ summary.totalDocentes }}</ion-label>
        </ion-item>
        <ion-item>
          <ion-label>Promedio general</ion-label>
          <ion-label slot="end">{{ summary.promedioGeneral }}</ion-label>
        </ion-item>
        <ion-item>
          <ion-label>Grupos activos</ion-label>
          <ion-label slot="end">{{ summary.gruposActivos }}</ion-label>
        </ion-item>
      </ion-list>
    </ion-card-content>
  </ion-card>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Acciones rápidas</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-button expand="block" routerLink="/calificaciones">Control de calificaciones</ion-button>
      <ion-button expand="block" fill="outline" routerLink="/alumnos">Ver alumnos</ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
